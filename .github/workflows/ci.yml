name: CI

# Build + test both apps on every push and pull request. Backend-first repo, but
# the two jobs are independent and run in parallel.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (mvnw verify)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # mvnw is tracked without the executable bit (Windows-authored); restore it
      # so the Linux runner can invoke the wrapper directly.
      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      # `verify` runs unit + integration tests (Testcontainers spins up Postgres
      # via the Docker daemon preinstalled on ubuntu-latest) and the Spotless
      # format check bound to the verify phase.
      - name: Build and test
        run: ./mvnw --batch-mode --no-transfer-progress verify

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      # No unit-test runner is wired up yet (Vitest lands with the component tests
      # in later phases); the production build doubles as the type-check + compile
      # gate for now.
      - name: Build
        run: npm run build
