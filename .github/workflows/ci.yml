name: CI

# Build + test both apps on every push and pull request. Backend-first repo, but
# the two jobs are independent and run in parallel.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (mvnw verify)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # mvnw is tracked without the executable bit (Windows-authored); restore it
      # so the Linux runner can invoke the wrapper directly.
      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      # `verify` runs unit + integration tests (Testcontainers spins up Postgres
      # via the Docker daemon preinstalled on ubuntu-latest), produces the JaCoCo
      # coverage report (target/site/jacoco/), and runs the Spotless format check
      # bound to the verify phase.
      - name: Build and test
        run: ./mvnw --batch-mode --no-transfer-progress verify

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      # Vitest + Testing Library + MSW unit/integration tests (hooks, components).
      - name: Test
        run: npm run test:coverage

      # The production build doubles as the type-check + compile gate.
      - name: Build
        run: npm run build

  e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Only the Playwright browser the suite targets (chromium) + its OS deps.
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # Playwright's webServer builds the SPA and serves the production preview;
      # the suite drives it against a deterministic in-memory backend mounted via
      # route interception (e2e/fixtures.ts), so no Postgres/JVM is needed in CI.
      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
