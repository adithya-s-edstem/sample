# Local development infrastructure for the Expense Tracker.
#
# Brings up PostgreSQL only — the backend (./mvnw spring-boot:run) and frontend
# (npm run dev) run on the host against this DB. See docs/technical-architecture.md
# §8–9 and docs/implementation-plan.md (Phase 0).
#
#   docker compose up -d        # start Postgres in the background
#   docker compose down         # stop (data survives in the named volume)
#   docker compose down -v      # stop and DROP the data volume
#
# All connection settings can be overridden via the environment (see the
# defaults below), so application.yml (P0-4) can point at the same values.

services:
  postgres:
    image: postgres:16-alpine
    container_name: expense-tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-expense-tracker}
      POSTGRES_USER: ${POSTGRES_USER:-expense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-expense}
    ports:
      # Host port is overridable to avoid clashing with a local Postgres install.
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - expense-tracker-pgdata:/var/lib/postgresql/data
    healthcheck:
      # Lets dependents (and CI) wait until Postgres actually accepts connections.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-expense} -d ${POSTGRES_DB:-expense-tracker}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  expense-tracker-pgdata:
    name: expense-tracker-pgdata
